{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Disaster Management</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>

<style>
  :root {
    --primary: #2563eb;
    --accent: #4f46e5;
    --glass: rgba(255,255,255,0.15);
    --glass-border: rgba(255,255,255,0.25);
  }

  body {
    font-family: 'Public Sans', sans-serif;
    background: radial-gradient(circle at 10% 20%, #dbeafe 0%, #c7d2fe 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glass-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
  }

  .fade-in {
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="w-full max-w-md glass-card rounded-3xl shadow-2xl p-10 fade-in">

  <!-- Logo Section -->
  <div class="flex justify-center mb-6">
    <img src="{% static 'images/logo.png' %}" alt="Logo" class="w-20 h-20 rounded-full shadow-lg ring-4 ring-white/40">
  </div>

  <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-2">Disaster Management</h1>
  <p class="text-center text-gray-500 mb-8">Sign in to continue</p>

  <!-- Login Form -->
  <form action="/myapp/loginpost/" method="post" class="space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input type="text" name="username" class="w-full rounded-lg border border-gray-300 px-4 py-3" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" class="w-full rounded-lg border border-gray-300 px-4 py-3" required>
    </div>

    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center space-x-2">
        <input type="checkbox" class="rounded border-gray-300">
        <span>Remember me</span>
      </label>
      <a href="#" class="text-[var(--primary)] hover:underline">Forgot password?</a>
    </div>

    <button type="submit"
      class="w-full bg-[var(--primary)] hover:bg-[var(--accent)] text-white font-semibold py-3 rounded-xl shadow-lg transition-transform transform hover:-translate-y-0.5">
      Login
    </button>
  </form>

  <!--<p class="text-center text-sm text-gray-500 mt-6">
    Don’t have an account?
    <a href="#" class="text-[var(--primary)] font-medium hover:underline">Sign up</a>
  </p> -->
</div>

</body>
</html>
