{% load static %}
<header class="sticky top-0 z-40 bg-white/70 backdrop-blur-xl border-b border-slate-200 shadow-sm">
  <div class="container mx-auto px-6 py-3 flex items-center justify-between gap-6">

    <!-- LEFT: Logo + title -->
    <div class="flex items-center gap-3">
      <div
        class="site-logo flex items-center justify-center border border-slate-200 rounded-xl h-12 w-12 overflow-hidden shadow-sm bg-gradient-to-br from-blue-100 to-blue-200">
        <img src="{% static 'images/logo.png' %}" class="h-full w-full object-cover" alt="Logo">
      </div>
      <div>
        <div class="text-xs uppercase tracking-wide text-slate-500">Admin Panel</div>
        <div
          class="text-lg md:text-xl font-extrabold bg-gradient-to-r from-blue-600 via-sky-500 to-cyan-400 text-transparent bg-clip-text">
          Disaster Management
        </div>
      </div>
    </div>

    <!-- CENTER: Navigation Links -->
    <nav class="hidden md:flex justify-center gap-6 text-sm font-medium text-slate-700">
      <a href="/myapp/home/" class="relative group transition">
        Home
        <span
          class="absolute left-0 bottom-0 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>
      </a>
      <a href="/myapp/view_camp/" class="relative group transition">
        Camps
        <span
          class="absolute left-0 bottom-0 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>
      </a>
      <a href="/myapp/camp_codinators/" class="relative group transition">
        Coordinators
        <span
          class="absolute left-0 bottom-0 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>
      </a>
      <a href="/myapp/complaints/" class="relative group transition">
        Complaints
        <span
          class="absolute left-0 bottom-0 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>
      </a><a href="/myapp/admin_view_news_reporter/" class="relative group transition">
        News reporter
        <span
          class="absolute left-0 bottom-0 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>
      </a>
    </nav>

    <!-- RIGHT: Profile + Alerts + Logout -->
    <div class="flex items-center justify-end gap-3">
      <!-- Profile
       <a href="/myapp/admin_home/" 
        class="flex items-center gap-2 text-sm px-3 py-1.5 rounded-xl border border-slate-200 shadow-sm hover:bg-blue-50 hover:border-blue-200 transition">#}
         <span class="material-icons text-blue-600">person</span>
         <span class="hidden sm:inline font-medium text-slate-700">Profile</span>
        </a> -->

      <!-- Alerts -->
      <a href="/myapp/notification/"
        class="flex items-center gap-2 text-sm px-3 py-1.5 rounded-xl bg-gradient-to-r from-rose-500 to-pink-500 text-white font-semibold shadow-md hover:shadow-lg transition">
        <span class="material-icons text-white">warning</span>
        <span class="hidden sm:inline">Alerts</span>
      </a>

      <!-- Logout (POST Form) -->
      <form id="logout-form" action="/myapp/login/" method="post" class="m-0 p-0">
        {% csrf_token %}
        <button type="submit"
          class="flex items-center gap-2 text-sm px-3 py-1.5 rounded-xl border border-slate-200 bg-white shadow-sm hover:bg-slate-100 hover:border-blue-300 transition">
          <span class="material-icons text-slate-600">logout</span>
          <span class="hidden sm:inline font-medium text-slate-700">Logout</span>
        </button>
      </form>
    </div>
  </div>

  <!-- MOBILE NAV (optional hamburger) -->
  <div
    class="md:hidden border-t border-slate-200 bg-white/70 backdrop-blur p-3 flex justify-around text-sm font-medium text-slate-700">
    <a href="/myapp/home/" class="hover:text-blue-600">Home</a>
    <a href="/myapp/view_camp/" class="hover:text-blue-600">Camps</a>
    <a href="/myapp/camp_codinators/" class="hover:text-blue-600">Coordinators</a>
    <a href="/myapp/camplaint_manage/" class="hover:text-blue-600">Complaints</a>
    <a href="/myapp/admin_view_news_reporter/" class="hover:text-blue-600">News reporter</a>
  </div>
</header>
